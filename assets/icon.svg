<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Arivo">
  <defs>
    <linearGradient id="arivo-bg" x1="64" y1="64" x2="448" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1A7A52"/>
      <stop offset="100%" stop-color="#00C27C"/>
    </linearGradient>
    <linearGradient id="arivo-shine" x1="128" y1="96" x2="384" y2="416" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- App icon background -->
  <rect width="512" height="512" rx="112" fill="url(#arivo-bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#arivo-shine)"/>
